<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="description" content="Pacman in real 3D — AR on Meta Quest & mobile." />
  <meta name="theme-color" content="#000000" />
  <title>PAC-MAN 3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23FFD700'/%3E%3Cpath d='M50 50 L95 25 A45 45 0 0 0 95 75 Z' fill='%23000'/%3E%3Ccircle cx='38' cy='32' r='6' fill='%23000'/%3E%3C/svg%3E" />
</head>
<body>
  <div class="shell">
    <header class="hud">
      <div class="hud-block">
        <span class="label">1UP</span>
        <span id="score">00</span>
        <span class="label level-label">LEVEL <span id="level">1</span></span>
      </div>
      <div class="hud-block hud-center">
        <h1 class="brand">PAC-MAN</h1>
      </div>
      <div class="hud-block hud-right">
        <span class="label">HIGH</span>
        <span id="high-score">00</span>
      </div>
    </header>

    <main class="stage" id="stage">
      <div id="overlay" class="overlay">
        <p id="overlay-title" class="overlay-title ready">READY!</p>
        <p id="overlay-sub" class="overlay-sub">Press Enter or Tap to Start</p>
        <div id="name-entry" class="name-entry hidden" aria-label="Name entry">
          <p class="name-label">ENTER YOUR NAME</p>
          <div id="name-slots" class="name-slots"></div>
          <div class="name-controls">
            <button type="button" id="name-prev" class="name-ctrl">◀</button>
            <button type="button" id="name-up" class="name-ctrl">▲</button>
            <button type="button" id="name-down" class="name-ctrl">▼</button>
            <button type="button" id="name-next" class="name-ctrl">▶</button>
            <button type="button" id="name-ok" class="name-ctrl name-ok">OK</button>
          </div>
          <p class="name-hint">7 letters · ←→ · ↑↓ · type · Enter</p>
        </div>
        <div id="level-select" class="level-select hidden" aria-label="Level select">
          <p class="name-label">SELECT LEVEL</p>
          <div class="level-picker">
            <button type="button" id="level-minus" class="name-ctrl" aria-label="Previous level">◀</button>
            <span id="level-pick-val" class="level-pick-val">1</span>
            <button type="button" id="level-plus" class="name-ctrl" aria-label="Next level">▶</button>
          </div>
          <button type="button" id="level-ok" class="name-ctrl name-ok">OK</button>
          <p class="name-hint">←→ · Enter · Esc</p>
        </div>
        <div id="char-select" class="level-select hidden" aria-label="Character select">
          <p class="name-label">SELECT CHARACTER</p>
          <div class="level-picker">
            <button type="button" id="char-minus" class="name-ctrl" aria-label="Previous character">◀</button>
            <span id="char-pick-val" class="level-pick-val char-pick-val">PAC-MAN</span>
            <button type="button" id="char-plus" class="name-ctrl" aria-label="Next character">▶</button>
          </div>
          <button type="button" id="char-ok" class="name-ctrl name-ok">OK</button>
          <p class="name-hint">←→ · Enter · Esc</p>
        </div>
        <ol id="scoreboard" class="scoreboard hidden" aria-label="High scores"></ol>
      </div>
    </main>

    <footer class="footer">
      <div class="jump-wrap">
        <button type="button" id="ar-btn" class="ar-btn" aria-label="Enter AR" hidden>AR</button>
        <button type="button" id="recenter-btn" class="recenter-btn" aria-label="Recenter board" hidden>RECENTER</button>
        <button type="button" id="char-btn" class="char-btn" aria-label="Select character">CHAR</button>
        <button type="button" id="level-btn" class="level-btn" aria-label="Select level">LEVEL</button>
        <button type="button" id="jump-btn" class="jump-btn" aria-label="Jump">JUMP ␣</button>
      </div>
      <div id="lives" class="lives" aria-label="Lives remaining"></div>
      <p class="hint">Frecce + WASD · Space · CHAR / C · LEVEL / L · H scores · T tono · AR</p>
      <p id="vl-tone" class="vl-tone show" aria-live="polite" role="button" tabindex="0">TONE: FLUTE</p>
    </footer>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.min.js"
    }
  }
  </script>
  <script type="module" src="game.js"></script>
</body>
</html>
